<!-- PAGE: FILE PELANGGAN -->
<div class="page" id="page-filepelanggan">
    <div class="list-topbar">
        <div class="list-topbar-left">
            <div style="display:flex;align-items:center;gap:6px">
                <iconify-icon icon="iwwa:folder" width="20" style="color:var(--accent)"></iconify-icon>
                <span style="font-size:0.9rem;font-weight:700;color:var(--text-primary)">Fail Pelanggan</span>
            </div>
        </div>
        <div class="list-topbar-right">
            <div class="list-search">
                <iconify-icon icon="iwwa:search" width="16"></iconify-icon>
                <input type="text" id="filePelangganSearch" placeholder="Cari nama pelanggan...">
            </div>
            <span class="list-count" id="filePelangganCount">0 pelanggan</span>
        </div>
    </div>

    <!-- Grid kad pelanggan -->
    <div id="filePelangganGrid" class="fp-grid"></div>
    <div class="list-empty" id="filePelangganEmpty" style="display:none">
        <iconify-icon icon="iwwa:folder" width="52"></iconify-icon>
        <p>Tiada fail pelanggan lagi.</p>
        <p>Fail akan dijana secara automatik apabila anda <strong>menyimpan Resit atau Invois</strong>.</p>
    </div>
</div>

<!-- Modal: Detail Fail Pelanggan -->
<div class="modal-overlay" id="modalFilePelanggan">
    <div class="modal" style="max-width:680px">
        <div class="modal-header">
            <h2 class="modal-title" id="modalFilePelangganTitle">Fail Pelanggan</h2>
            <button class="modal-close" onclick="tutupModal('modalFilePelanggan')">
                <iconify-icon icon="iwwa:close" width="18"></iconify-icon>
            </button>
        </div>
        <div class="modal-body" id="modalFilePelangganBody" style="overflow-y:auto;max-height:calc(90vh - 130px)"></div>
    </div>
</div>
